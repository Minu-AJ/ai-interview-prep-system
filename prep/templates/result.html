<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Result</title>
</head>
<body>
    <h1>{{ message }}</h1>

    <hr>

    <h3>Total Score : {{ total_score}}</h3>
    <h3>Total Questions : {{ total_questions }}</h3>
    <h3>Wrong Answers : {{ wrong_answers }}</h3>
    <h3>Percentage : {{ percentage }}%</h3>
    <h3>Performance : {{ performance }}</h3>
</body>
</html>
