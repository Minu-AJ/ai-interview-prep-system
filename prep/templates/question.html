<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Interview Question</title>
</head>
<body>

<div class="container mt-5">

    <h2>{{ topic.name }}</h2>

    <!-- Progress Bar Starts Here -->
    <h5>Question {{ current_question }} of {{ total_questions }}</h5>

    <div class="progress mb-4">
        <div
            class="progress-bar bg-success"
            role="progressbar"
            style="width: {{ progress }}%;"
            aria-valuenow="{{ progress }}"
            aria-valuemin="0"
            aria-valuemax="100">
            {{ progress }}%
        </div>
    </div>
    <!-- Progress Bar Ends Here -->

    <div class="alert alert-warning text-center">
        <i class="bi bi-alarm-fill me-2"></i>
        Time Left:
        <span id="timer">30</span> seconds
    </div>

    <p><strong>Question:</strong></p>
    <p>{{ question.question_text }}</p>

    <form id="questionForm" action="{% url 'question' topic.id question.id %}" method="post">
        {% csrf_token %}

        <input
            type="text"
            class="form-control mb-3"
            name="answer"
            placeholder="Enter your answer"
            required>

        <button type="submit" class="btn btn-primary">
            Submit & Next
        </button>
    </form>

</div>

<script>
    let timeLeft = 30;
    const timer = document.getElementById('timer');
    const form = document.getElementById('questionForm');
    const countdown = setInterval(function() {

        timeLeft--;
        timer.textContent = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            alert("Time's up! Moving to the next question.");
            form.submit();
        } 
    }, 1000);
</script>
</body>
</html>
